<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSM CRM — Propostas Comerciais</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<style>
  /* Sidebar links — sem @apply (não funciona com Tailwind CDN) */
  .sidebar-link{
    display:flex;align-items:center;gap:.75rem;
    padding:.5rem .75rem;margin:.1rem .5rem;
    border-radius:.5rem;font-size:.875rem;font-weight:500;
    color:#9ca3af;cursor:pointer;text-decoration:none;
    transition:background .15s, color .15s;
    white-space:nowrap;
  }
  .sidebar-link:hover{background:#1f2937;color:#fff}
  .sidebar-link.active{background:#2563eb;color:#fff}
  .sidebar-link svg{flex-shrink:0;width:1rem;height:1rem}

  /* Cards */
  .card{background:#fff;border-radius:.75rem;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.06)}

  /* Botões */
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem 1rem;border-radius:.5rem;font-size:.875rem;font-weight:500;cursor:pointer;transition:background .15s;border:none}
  .btn-primary{background:#2563eb;color:#fff} .btn-primary:hover{background:#1d4ed8}
  .btn-secondary{background:#fff;color:#374151;border:1px solid #d1d5db} .btn-secondary:hover{background:#f9fafb}
  .btn-danger{background:#dc2626;color:#fff} .btn-danger:hover{background:#b91c1c}
  .btn-sm{padding:.3rem .7rem;font-size:.8rem}

  /* Inputs */
  .inp{display:block;width:100%;border:1px solid #d1d5db;border-radius:.5rem;padding:.45rem .75rem;font-size:.875rem;color:#111827;outline:none;box-sizing:border-box}
  .inp:focus{border-color:#2563eb;box-shadow:0 0 0 2px #bfdbfe}
  select.inp{background:#fff}

  /* Formulários */
  .lbl{display:block;font-size:.8rem;font-weight:500;color:#374151;margin-bottom:.25rem}

  /* Badges */
  .badge{display:inline-flex;align-items:center;padding:.15rem .65rem;border-radius:9999px;font-size:.72rem;font-weight:600}

  /* Tabelas */
  .th{padding:.6rem 1rem;text-align:left;font-size:.72rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;background:#f9fafb;white-space:nowrap}
  .td{padding:.65rem 1rem;font-size:.85rem;color:#111827;border-top:1px solid #f3f4f6}
  tr:hover .td{background:#f9fafb}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem}
  .modal{background:#fff;border-radius:1rem;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}

  /* Layout base */
  html,body{height:100%;margin:0;padding:0}
  .layout{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:220px;min-width:220px;background:#111827;display:flex;flex-direction:column;overflow:hidden}
  .main-area{flex:1;overflow-y:auto;background:#f9fafb}
  .content-wrap{padding:1.5rem;max-width:1280px;margin:0 auto}

  /* Seção label no nav */
  .nav-section{padding:.75rem 1rem .25rem;font-size:.7rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em}

  /* Tela de login */
  #login-screen{
    position:fixed;inset:0;background:#f1f5f9;
    display:flex;align-items:center;justify-content:center;
    z-index:100;
  }
  #login-screen.hidden{display:none}
  .login-card{
    background:#fff;border-radius:1.25rem;padding:2.5rem;
    width:100%;max-width:400px;
    box-shadow:0 8px 40px rgba(0,0,0,.12);
  }
  #app-wrap{display:none}
  #app-wrap.visible{display:flex}

  /* Print */
  @media print{
    .sidebar,.no-print{display:none!important}
    .main-area{margin:0!important;padding:0!important}
    .card{box-shadow:none;border:none}
  }
</style>
</head>
<body style="font-family:Inter,system-ui,sans-serif;margin:0;padding:0;background:#f9fafb;color:#111827">

<!-- ═══════════════════ TELA DE LOGIN ═══════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <!-- Logo -->
    <div style="display:flex;align-items:center;gap:.875rem;margin-bottom:2rem">
      <div style="width:3rem;height:3rem;background:#2563eb;border-radius:.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span style="color:#fff;font-weight:900;font-size:.875rem;letter-spacing:.05em">TSM</span>
      </div>
      <div>
        <p style="font-size:1.25rem;font-weight:700;color:#111827;margin:0">TSM CRM</p>
        <p style="font-size:.8rem;color:#6b7280;margin:0">Propostas Comerciais</p>
      </div>
    </div>

    <h2 style="font-size:1.125rem;font-weight:600;color:#111827;margin:0 0 1.5rem">Acesse sua conta</h2>

    <div id="login-error" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.85rem;padding:.6rem .9rem;border-radius:.5rem;margin-bottom:1rem"></div>

    <div style="margin-bottom:1rem">
      <label class="lbl">E-mail</label>
      <input id="login-email" class="inp" type="email" placeholder="seu@email.com" autocomplete="email"
        onkeydown="if(event.key==='Enter')document.getElementById('login-senha').focus()">
    </div>
    <div style="margin-bottom:1.5rem">
      <label class="lbl">Senha</label>
      <input id="login-senha" class="inp" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;padding:.6rem 1rem;font-size:.95rem">
      Entrar
    </button>

    <p style="margin-top:1.25rem;font-size:.78rem;color:#9ca3af;text-align:center">
      Dados salvos localmente no navegador
    </p>
  </div>
</div>

<!-- ═══════════════════ APP PRINCIPAL ═══════════════════ -->
<div id="app-wrap" class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Logo -->
    <div style="padding:1rem;border-bottom:1px solid #1f2937;display:flex;align-items:center;gap:.75rem;flex-shrink:0">
      <div style="width:2.25rem;height:2.25rem;background:#2563eb;border-radius:.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span style="color:#fff;font-weight:900;font-size:.75rem">TSM</span>
      </div>
      <div>
        <p style="color:#fff;font-weight:600;font-size:.875rem;margin:0;line-height:1.2">TSM CRM</p>
        <p style="color:#6b7280;font-size:.7rem;margin:0">Propostas Comerciais</p>
      </div>
    </div>

    <!-- Nav -->
    <nav style="flex:1;padding:.5rem 0;overflow-y:auto">
      <a class="sidebar-link" data-page="dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a class="sidebar-link" data-page="oportunidades">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        Oportunidades
      </a>
      <a class="sidebar-link" data-page="propostas">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Propostas

      <div class="nav-section">Cadastros</div>

        Clientes
      </a>
      <a class="sidebar-link" data-page="contatos">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Contatos
      </a>
      <a class="sidebar-link" data-page="catalogo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Catálogo
      </a>

      <div class="nav-section">Configurações</div>
      <a class="sidebar-link" data-page="usuarios">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        Usuários

    <!-- Footer com usuário logado + logout -->
    <div style="padding:.75rem;border-top:1px solid #1f2937;flex-shrink:0">
      <div id="sidebar-user" style="font-size:.75rem;color:#9ca3af;margin-bottom:.5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
      <button onclick="doLogout()" style="width:100%;background:transparent;border:1px solid #374151;color:#9ca3af;border-radius:.4rem;padding:.3rem .6rem;font-size:.75rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;justify-content:center;transition:background .15s"
        onmouseover="this.style.background='#1f2937'" onmouseout="this.style.background='transparent'">
        <svg style="width:.875rem;height:.875rem;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-area">
    <div id="content" class="content-wrap"></div>
  </main>
</div><!-- /app-wrap -->

<!-- Modal global -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// AUTH — sessão simples via sessionStorage
// ═══════════════════════════════════════════════════════
const AUTH = {
  SESSION_KEY: 'tsm_session',
  getSession(){ try{return JSON.parse(sessionStorage.getItem(this.SESSION_KEY)||'null')}catch{return null} },
  setSession(user){ sessionStorage.setItem(this.SESSION_KEY, JSON.stringify(user)) },
  clearSession(){ sessionStorage.removeItem(this.SESSION_KEY) },
  isLogged(){ return !!this.getSession() },
  currentUser(){ return this.getSession() },
}

function doLogin(){
  const email=(document.getElementById('login-email')?.value||'').trim().toLowerCase()
  const senha=(document.getElementById('login-senha')?.value||'')
  const errEl=document.getElementById('login-error')
  errEl.style.display='none'

  if(!email||!senha){ errEl.textContent='Preencha e-mail e senha.'; errEl.style.display='block'; return }

  const users=DB.all('usuarios')
  const user=users.find(u=>u.email?.toLowerCase()===email && u.ativo!==false)
  if(!user||user.senha!==senha){
    errEl.textContent='E-mail ou senha incorretos.'; errEl.style.display='block'; return
  }

  AUTH.setSession({id:user.id,nome:user.nome,email:user.email,perfil:user.perfil})
  showApp()
}

function doLogout(){
  AUTH.clearSession()
  showLogin()
}

function showLogin(){
  document.getElementById('login-screen').classList.remove('hidden')
  document.getElementById('app-wrap').classList.remove('visible')
  document.getElementById('login-email').value=''
  document.getElementById('login-senha').value=''
  document.getElementById('login-error').style.display='none'
}

function showApp(){
  document.getElementById('login-screen').classList.add('hidden')
  document.getElementById('app-wrap').classList.add('visible')
  const u=AUTH.currentUser()
  const sidebarUser=document.getElementById('sidebar-user')
  if(sidebarUser && u) sidebarUser.textContent=`${u.nome} · ${u.perfil==='administrador'?'Admin':u.perfil==='vendedor'?'Vendedor':u.perfil==='arquiteto'?'Arquiteto':u.perfil}`
  navigate('dashboard')
}

// ═══════════════════════════════════════════════════════
// DATABASE (localStorage)
// ═══════════════════════════════════════════════════════
const DB = {
  get(k){ try{return JSON.parse(localStorage.getItem('tsm_'+k)||'[]')}catch{return[]} },
  set(k,v){ localStorage.setItem('tsm_'+k, JSON.stringify(v)) },
  id(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) },
  all(k){ return this.get(k) },
  find(k,id){ return this.get(k).find(x=>x.id===id) },
  insert(k,obj){ const d=this.get(k); const r={...obj,id:this.id(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}; d.push(r); this.set(k,d); return r },
  update(k,id,obj){ const d=this.get(k).map(x=>x.id===id?{...x,...obj,updatedAt:new Date().toISOString()}:x); this.set(k,d); return d.find(x=>x.id===id) },
  delete(k,id){ this.set(k,this.get(k).filter(x=>x.id!==id)) },
  nextPropostaNum(sigla){
    const now=new Date()
    const yy=now.getFullYear().toString().slice(2)
    const mm=String(now.getMonth()+1).padStart(2,'0')
    const prefixMes=`TSM${sigla||''}-${yy}${mm}-`
    // Conta propostas já criadas no mesmo mês/ano (independente da unidade)
    const props=this.get('propostas')
    const noMes=props.filter(p=>p.numero&&p.numero.includes(`-${yy}${mm}-`)).length
    const seq=(noMes+1).toString().padStart(4,'0')
    return `${prefixMes}${seq}`
  }
}

// ═══════════════════════════════════════════════════════
// SEED DATA
// ═══════════════════════════════════════════════════════
function seedIfEmpty(){
  if(DB.get('unidades').length===0){
    ['Serra do Mar|SDM','Sul de Minas|SUL','Vale do Paraíba|VDP'].forEach(s=>{
      const[nome,sigla]=s.split('|')
      DB.insert('unidades',{nome,sigla,descricao:'',ativo:true})
    })
  }
  if(DB.get('catalogo').length===0){
    const itens=[
      {nome:'Implantação Financeiro',       produto:'ERP Protheus',esforcoMin:80, esforcoMax:160,valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Implantação Estoque',          produto:'ERP Protheus',esforcoMin:60, esforcoMax:120,valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Implantação Compras',          produto:'ERP Protheus',esforcoMin:80, esforcoMax:140,valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Implantação Faturamento',      produto:'ERP Protheus',esforcoMin:60, esforcoMax:100,valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Implantação RH / Folha',       produto:'RM',          esforcoMin:80, esforcoMax:160,valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Implantação Gestão de Obras',  produto:'RM',          esforcoMin:100,esforcoMax:200,valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Implantação Workflow',         produto:'FLUIG',       esforcoMin:40, esforcoMax:80, valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Implantação Portal Corporativo',produto:'FLUIG',      esforcoMin:60, esforcoMax:120,valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Treinamento de Usuários',      produto:'ERP Protheus',esforcoMin:16, esforcoMax:32, valorHora:175,tipoPreco:'por_hora',ativo:true},
      {nome:'Migração de Dados',            produto:'ERP Protheus',esforcoMin:40, esforcoMax:80, valorHora:175,tipoPreco:'por_hora',ativo:true},
    ]
    itens.forEach(i=>DB.insert('catalogo',i))
  }
  if(DB.get('usuarios').length===0){
    DB.insert('usuarios',{nome:'Administrador',email:'admin@tsm.com.br',senha:'admin123',perfil:'administrador',unidadeId:'',ativo:true})
    DB.insert('usuarios',{nome:'João Vendedor',email:'joao@tsm.com.br',senha:'tsm123',perfil:'vendedor',unidadeId:'',ativo:true})
    DB.insert('usuarios',{nome:'Maria Arquiteta',email:'maria@tsm.com.br',senha:'tsm123',perfil:'arquiteto',unidadeId:'',ativo:true})
  } else {
    // Migração: adicionar senha padrão para usuários que ainda não têm
    const senhasPadrao={'admin@tsm.com.br':'admin123','joao@tsm.com.br':'tsm123','maria@tsm.com.br':'tsm123'}
    DB.all('usuarios').forEach(u=>{
      if(!u.senha){
        const senha=senhasPadrao[u.email?.toLowerCase()]||'tsm123'
        DB.update('usuarios',u.id,{senha})
      }
    })
  }
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const H = {
  cur(v){ return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0) },
  date(d){ if(!d)return'—'; try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR')}catch{return d} },
  dt(d){ if(!d)return'—'; return new Date(d).toLocaleString('pt-BR') },
  esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') },
  badge(txt,cls){ return `<span class="badge ${cls}">${txt}</span>` },
  statusOp(s){
    const m={aberta:'bg-blue-100 text-blue-800',em_negociacao:'bg-yellow-100 text-yellow-800',proposta_enviada:'bg-purple-100 text-purple-800',ganha:'bg-green-100 text-green-800',perdida:'bg-red-100 text-red-800',cancelada:'bg-gray-100 text-gray-700'}
    const l={aberta:'Aberta',em_negociacao:'Em Negociação',proposta_enviada:'Proposta Enviada',ganha:'Ganha',perdida:'Perdida',cancelada:'Cancelada'}
    return this.badge(l[s]||s, m[s]||'bg-gray-100 text-gray-700')
  },
  statusProp(s){
    const m={rascunho:'bg-gray-100 text-gray-700',enviada:'bg-blue-100 text-blue-800',aprovada:'bg-green-100 text-green-800',rejeitada:'bg-red-100 text-red-800',expirada:'bg-orange-100 text-orange-700',revisao:'bg-yellow-100 text-yellow-800'}
    const l={rascunho:'Rascunho',enviada:'Enviada',aprovada:'Aprovada',rejeitada:'Rejeitada',expirada:'Expirada',revisao:'Em Revisão'}
    return this.badge(l[s]||s, m[s]||'bg-gray-100 text-gray-700')
  },
  perfil(p){const m={vendedor:'Vendedor',arquiteto:'Arquiteto de Soluções',gerente_unidade:'Gerente da Unidade',gerente_geral:'Gerente Geral',administrador:'Administrador'};return m[p]||p},
  empty(title,desc,btnLabel,btnAction){
    return `<div class="flex flex-col items-center py-16 text-center">
      <div class="w-14 h-14 bg-gray-100 rounded-2xl flex items-center justify-center mb-3">
        <svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg>
      </div>
      <h3 class="font-semibold text-gray-900">${title}</h3>
      ${desc?`<p class="text-gray-400 text-sm mt-1 max-w-xs">${desc}</p>`:''}
      ${btnLabel?`<button class="btn btn-primary mt-4 btn-sm" onclick="${btnAction}">+ ${btnLabel}</button>`:''}
    </div>`
  },
  header(title,sub,btnLabel,btnAction){
    return `<div class="flex items-start justify-between mb-5">
      <div><h1 class="text-2xl font-bold text-gray-900">${title}</h1>${sub?`<p class="text-gray-500 text-sm mt-0.5">${sub}</p>`:''}</div>
      ${btnLabel?`<button class="btn btn-primary" onclick="${btnAction}">+ ${btnLabel}</button>`:''}
    </div>`
  },
  selectOpts(arr,valKey,labelFn,selected=''){
    return arr.map(x=>`<option value="${H.esc(x[valKey])}" ${x[valKey]===selected?'selected':''}>${H.esc(labelFn(x))}</option>`).join('')
  },
  nameById(k,id,field='nome'){const r=DB.find(k,id);return r?r[field]:'—'},
}

function navigate(page, params={}){
  window._currentPage=page
  window._params=params
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.classList.toggle('active', el.dataset.page===page)
  })
  const renders={
    dashboard:renderDashboard, oportunidades:renderOportunidades, propostas:renderPropostas,
    clientes:renderClientes, contatos:renderContatos,
    catalogo:renderCatalogo, usuarios:renderUsuarios, unidades:renderUnidades
  }
  const fn=renders[page]||renderDashboard
  document.getElementById('content').innerHTML=fn(params)
  bindEvents()
}

function bindEvents(){
  // Nav
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.onclick=()=>navigate(el.dataset.page)
  })
}

function renderOpContatoOpts(clienteId, selectedId){
  if(!clienteId) return ''
  const ctts=DB.all('contatos').filter(c=>c.clienteId===clienteId)
  if(ctts.length===0) return ''
  // Principal primeiro
  ctts.sort((a,b)=>(b.principal?1:0)-(a.principal?1:0))
  return ctts.map(c=>{
    const label=(c.principal?'★ ':'') + c.nome + (c.cargo?' — '+c.cargo:'')
    return `<option value="${c.id}" ${c.id===selectedId?'selected':''}>${label}</option>`
  }).join('')
}

function onClienteOportunidadeChange(){
  const clienteId=document.getElementById('op-cliente')?.value||''
  const sel=document.getElementById('op-contato')
  const hint=document.getElementById('op-contato-hint')
  if(!sel) return

  // Recarrega as opções filtradas pelo cliente
  sel.innerHTML='<option value="">Nenhum</option>'+renderOpContatoOpts(clienteId,'')

  // Pré-seleciona o contato principal se existir
  if(clienteId){
    const principal=DB.all('contatos').find(c=>c.clienteId===clienteId&&c.principal)
    if(principal){
      sel.value=principal.id
      if(hint) hint.style.display='inline'
    } else {
      if(hint) hint.style.display='none'
    }

    // Auto-preenche vendedor a partir do cliente
    const cli=DB.find('clientes',clienteId)
    const selVendedor=document.getElementById('op-vendedor')
    if(cli&&cli.vendedorId&&selVendedor){
      selVendedor.value=cli.vendedorId
    }
  } else {
    if(hint) hint.style.display='none'
  }
}

function saveOportunidade(id){
  const data={
    titulo:document.getElementById('op-titulo').value.trim(),
    status:document.getElementById('op-status').value,
    unidadeId:document.getElementById('op-unidade').value,
    clienteId:document.getElementById('op-cliente').value,
    contatoId:document.getElementById('op-contato').value,
    vendedorId:document.getElementById('op-vendedor').value,
    arquitetoId:document.getElementById('op-arquiteto').value,
    valorEstimado:parseFloat(document.getElementById('op-valor').value)||0,
    probabilidade:parseInt(document.getElementById('op-prob').value)||50,
    dataFechamento:document.getElementById('op-fechamento').value,
    origem:document.getElementById('op-origem').value.trim(),
    descricao:document.getElementById('op-desc').value.trim(),
  }
  if(!data.titulo){alert('Título é obrigatório');return}
  if(id) DB.update('oportunidades',id,data); else DB.insert('oportunidades',data)
  closeModal(); navigate('oportunidades')
}
function delOportunidade(id){
  if(!confirm('Excluir esta oportunidade?'))return
  DB.delete('oportunidades',id); closeModal(); navigate('oportunidades')
}

function _resolverImpostoProposta(p, ops){
  // Se a proposta já tem impostoPercentual salvo, usa ele
  if(p.impostoPercentual!=null) return p.impostoPercentual
  // Senão, resolve via oportunidade → unidade
  if(p.oportunidadeId){
    const op=(ops||DB.all('oportunidades')).find(o=>o.id===p.oportunidadeId)
    if(op&&op.unidadeId){
      const uni=DB.find('unidades',op.unidadeId)
      if(uni&&uni.imposto) return uni.imposto
    }
  }
  return 0
}

  }
  return `<table class="w-full text-xs">
    <thead><tr class="bg-gray-50 border-b border-gray-200">
      <th class="th py-1.5">Do Catálogo / Descrição</th>
      <th class="th py-1.5 w-20 text-center">Horas/Qtd</th>
      <th class="th py-1.5 w-24 text-right">Valor Unit.</th>
      <th class="th py-1.5 w-14 text-center">Desc%</th>
      <th class="th py-1.5 w-24 text-right">Total</th>
      <th class="th py-1.5 w-6"></th>
    </tr></thead>
    <tbody>${_propostaItens.map((item,i)=>{
      const total=calcItemTotal(item)
      return `<tr class="border-b border-gray-100">
        <td class="td py-1.5">
          <select class="inp py-0.5 text-xs mb-1" onchange="applyFromCatalog(${i},this.value)">
            <option value="">— Personalizado —</option>
            ${cat.map(c=>`<option value="${c.id}" ${item.catalogoId===c.id?'selected':''}>${c.codigo?c.codigo+' — ':''} ${c.nome}</option>`).join('')}
          </select>
          <input class="inp py-0.5 text-xs" value="${H.esc(item.descricao||'')}" placeholder="Descrição..." oninput="_propostaItens[${i}].descricao=this.value;recalcTotais()">
        </td>
        <td class="td py-1.5"><input class="inp py-0.5 text-right" type="number" min="0" step="0.5" value="${item.horas||item.quantidade||0}" oninput="_propostaItens[${i}].horas=parseFloat(this.value)||0;recalcTotais()"></td>
        <td class="td py-1.5"><input class="inp py-0.5 text-right" type="number" min="0" step="0.01" value="${item.valorHora||item.valorUnitario||0}" oninput="_propostaItens[${i}].valorHora=parseFloat(this.value)||0;recalcTotais()"></td>
        <td class="td py-1.5"><input class="inp py-0.5 text-center" type="number" min="0" max="100" step="1" value="${item.descontoPercentual||0}" oninput="_propostaItens[${i}].descontoPercentual=parseFloat(this.value)||0;recalcTotais()"></td>
        <td class="td py-1.5 text-right font-semibold item-total-${i}">${H.cur(total)}</td>
        <td class="td py-1.5"><button class="text-gray-300 hover:text-red-500" onclick="removePropostaItem(${i})">&times;</button></td>
      </tr>`}).join('')}
    </tbody>
  </table>`
}

function applyFromCatalog(idx,catId){
  const cat=DB.find('catalogo',catId)
  if(!cat)return
  _propostaItens[idx].catalogoId=catId
  _propostaItens[idx].descricao=cat.nome
  _propostaItens[idx].horas=cat.tipoPreco==='por_hora'?(cat.esforcoMin??cat.horasPadrao??0):1
  _propostaItens[idx].valorHora=cat.tipoPreco==='por_hora'?(cat.valorHora||175):(cat.valorFixo||0)
  _propostaItens[idx].descontoPercentual=0
  refreshItensTable()
}

function calcItemTotal(item){
  const h=item.horas||item.quantidade||0
  const v=item.valorHora||item.valorUnitario||0
  const d=item.descontoPercentual||0
  return h*v*(1-d/100)
}

function recalcTotais(){
  const subtotal=_propostaItens.reduce((a,i)=>a+calcItemTotal(i),0)
  const desc=parseFloat(document.getElementById('p-desc-geral')?.value)||0
  const subtotalDesc=subtotal*(1-desc/100)
  const imposto=parseFloat(document.getElementById('p-imposto')?.value)||0
  const valorImposto=subtotalDesc*(imposto/100)
  const total=subtotalDesc+valorImposto
  const el=id=>document.getElementById(id)
  if(el('p-subtotal'))     el('p-subtotal').textContent=H.cur(subtotal)
  if(el('p-subtotal-desc'))el('p-subtotal-desc').textContent=H.cur(subtotalDesc)
  if(el('p-valor-imposto'))el('p-valor-imposto').textContent=H.cur(valorImposto)
  if(el('p-total'))        el('p-total').textContent=H.cur(total)
  // Atualizar totais por linha
  _propostaItens.forEach((item,i)=>{
    const row=document.querySelector(`.item-total-${i}`)
    if(row)row.textContent=H.cur(calcItemTotal(item))
  })
}

function refreshItensTable(){
  document.getElementById('proposta-itens').innerHTML=renderItensTable()
  recalcTotais()
}

function addPropostaItem(){
  _propostaItens.push({descricao:'',horas:0,valorHora:0,descontoPercentual:0})
  refreshItensTable()
}

function removePropostaItem(i){
  _propostaItens.splice(i,1); refreshItensTable()
}

function saveProposta(id, andClose=true){
  const subtotal=_propostaItens.reduce((a,i)=>a+calcItemTotal(i),0)
  const descGeral=parseFloat(document.getElementById('p-desc-geral')?.value)||0
  const impostoPercentual=parseFloat(document.getElementById('p-imposto')?.value)||0
  const valorDesconto=subtotal*(descGeral/100)
  const subtotalDesc=subtotal-valorDesconto
  const valorImposto=subtotalDesc*(impostoPercentual/100)
  const data={
    oportunidadeId:document.getElementById('p-op').value,
    status:document.getElementById('p-status').value,
    validade:document.getElementById('p-validade').value,
    condicoesPagamento:document.getElementById('p-cond').value.trim(),
    observacoes:document.getElementById('p-obs').value.trim(),
    descontoGeral:descGeral,
    impostoPercentual,
    valorSubtotal:subtotal,
    valorDesconto,
    valorImposto,
    valorTotal:subtotalDesc+valorImposto,
    itens:JSON.parse(JSON.stringify(_propostaItens)),
  }
  let saved
  if(id){ saved=DB.update('propostas',id,data) }
  else {
    // Resolve sigla da unidade via oportunidade vinculada
    let sigla=''
    if(data.oportunidadeId){
      const op=DB.find('oportunidades',data.oportunidadeId)
      if(op&&op.unidadeId){
        const uni=DB.find('unidades',op.unidadeId)
        if(uni&&uni.sigla) sigla=uni.sigla.toUpperCase()
      }
    }
    data.numero=DB.nextPropostaNum(sigla)
    saved=DB.insert('propostas',data)
  }
  if(andClose){ closeModal(); navigate('propostas') }
  return saved
}

function delProposta(id){
  if(!confirm('Excluir esta proposta?'))return
  DB.delete('propostas',id); closeModal(); navigate('propostas')
}

function downloadPDF(id){
  const p=DB.find('propostas',id); if(!p)return
  const op=p.oportunidadeId?DB.find('oportunidades',p.oportunidadeId):null
  const cli=op&&op.clienteId?DB.find('clientes',op.clienteId):null
  const ctt=op&&op.contatoId?DB.find('contatos',op.contatoId):null
  const vend=op&&op.vendedorId?DB.find('usuarios',op.vendedorId):null
  const uni=op&&op.unidadeId?DB.find('unidades',op.unidadeId):null

  const {jsPDF}=window.jspdf
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'})
  const W=doc.internal.pageSize.getWidth(), M=15
  const azul=[29,78,216], branco=[255,255,255], cinza=[107,114,128]

  // Header
  doc.setFillColor(...azul); doc.rect(0,0,W,28,'F')
  doc.setTextColor(...branco)
  doc.setFontSize(18); doc.setFont('helvetica','bold'); doc.text('TSM',M,13)
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.text('Serra do Mar · Sul de Minas · Vale do Paraíba',M,20)
  doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.text('PROPOSTA COMERCIAL',W-M,13,{align:'right'})
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.text(p.numero||'Rascunho',W-M,20,{align:'right'})

  let y=35
  doc.setTextColor(0,0,0); doc.setFontSize(8)

  // Info row
  const info=[['Data:',H.date(p.createdAt)],['Validade:',H.date(p.validade)||'—'],['Unidade:',uni?`${uni.nome} (${uni.sigla})`:'—'],['Vendedor:',vend?vend.nome:'—']]
  info.forEach(([l,v],i)=>{
    const x=M+(i<2?0:W/2-M)+(i%2===0?0:W/4-M)
    if(i===2) y=35
    doc.setFont('helvetica','bold'); doc.text(l,M+(i%2)*(W/2-M),y+(Math.floor(i/2)*6))
    doc.setFont('helvetica','normal'); doc.text(v,M+(i%2)*(W/2-M)+22,y+(Math.floor(i/2)*6))
  })
  y+=14

  // Seção cliente
  doc.setFillColor(243,244,246); doc.rect(M,y,W-M*2,6,'F')
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...azul)
  doc.text('DADOS DO CLIENTE',M+2,y+4)
  y+=10; doc.setTextColor(0,0,0); doc.setFont('helvetica','normal'); doc.setFontSize(8)

  if(cli){
    doc.setFont('helvetica','bold'); doc.text(cli.nome,M,y)
    doc.setFont('helvetica','normal')
    if(cli.cpfCnpj){y+=5;doc.text('CNPJ: '+cli.cpfCnpj,M,y)}
    const end=[cli.endereco,cli.complemento].filter(Boolean).join(', ')
    if(end){y+=5;doc.text(end,M,y)}
    if(cli.cidade){
      const locali=cli.cidade+(cli.estado?' — '+cli.estado:'')
      y+=5;doc.text(locali,M,y)
    }
    if(cli.email){y+=5;doc.text(cli.email,M,y)}
    if(cli.telefone){doc.text('Tel: '+cli.telefone,W/2,y)}
    if(cli.contato&&!ctt){y+=5;doc.text('Contato: '+cli.contato,M,y)}
  }
  if(ctt){y+=5;doc.text(`Contato: ${ctt.nome}${ctt.cargo?' — '+ctt.cargo:''}${ctt.email?' | '+ctt.email:''}`,M,y)}
  y+=10

  if(op){
    doc.setFont('helvetica','bold'); doc.setFontSize(9)
    doc.text('Ref.: '+op.titulo,M,y); y+=8
    doc.setFont('helvetica','normal'); doc.setFontSize(8)
  }

  // Tabela itens
  doc.setFillColor(243,244,246); doc.rect(M,y,W-M*2,6,'F')
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...azul)
  doc.text('ITENS DA PROPOSTA',M+2,y+4); y+=8; doc.setTextColor(0,0,0)

  doc.autoTable({
    startY:y, margin:{left:M,right:M},
    head:[['Serviço / Descrição','Horas','Valor/h','Desc%','Total']],
    body:(p.itens||[]).map(item=>[item.descricao||'—',item.horas||item.quantidade||0,H.cur(item.valorHora||item.valorUnitario||0),item.descontoPercentual>0?item.descontoPercentual+'%':'—',H.cur(calcItemTotal(item))]),
    foot:[
      ['','','','Subtotal',H.cur(p.valorSubtotal)],
      ...(p.descontoGeral>0?[['','','',`Desconto (${p.descontoGeral}%)`,`— ${H.cur(p.valorDesconto)}`]]:[]),
      ...(p.impostoPercentual>0?[['','','',`(+) Imposto (${p.impostoPercentual}%)`,H.cur(p.valorImposto||0)]]:[]),
      ['','','','TOTAL',H.cur(p.valorTotal)],
    ],
    headStyles:{fillColor:azul,textColor:branco,fontSize:8,fontStyle:'bold'},
    footStyles:{fillColor:[249,250,251],textColor:[0,0,0],fontSize:8,fontStyle:'bold'},
    bodyStyles:{fontSize:8},
    columnStyles:{0:{cellWidth:'auto'},1:{cellWidth:18,halign:'center'},2:{cellWidth:28,halign:'right'},3:{cellWidth:16,halign:'center'},4:{cellWidth:28,halign:'right',fontStyle:'bold'}},
    alternateRowStyles:{fillColor:[249,250,251]},
  })

  let yf=doc.lastAutoTable.finalY+8
  if(p.condicoesPagamento){
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...azul)
    doc.text('CONDIÇÕES DE PAGAMENTO',M,yf); yf+=5
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0,0,0)
    const lines=doc.splitTextToSize(p.condicoesPagamento,W-M*2)
    doc.text(lines,M,yf); yf+=lines.length*5+4
  }
  if(p.observacoes){
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...azul)
    doc.text('OBSERVAÇÕES',M,yf); yf+=5
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0,0,0)
    const lines=doc.splitTextToSize(p.observacoes,W-M*2)
    doc.text(lines,M,yf); yf+=lines.length*5+4
  }

  // Assinaturas
  if(yf<230)yf=230
  doc.setDrawColor(200,200,200)
  doc.line(M,yf,M+65,yf); doc.line(W-M-65,yf,W-M,yf); yf+=4
  doc.setFontSize(8); doc.setTextColor(...cinza)
  doc.text(vend?vend.nome:'Responsável Comercial',M+32,yf,{align:'center'})
  doc.text('Cliente / Responsável',W-M-32,yf,{align:'center'})

  // Rodapé
  const pH=doc.internal.pageSize.getHeight()
  doc.setFillColor(...azul); doc.rect(0,pH-10,W,10,'F')
  doc.setTextColor(...branco); doc.setFontSize(7)
  doc.text(`TSM — Proposta ${p.numero||''} — Gerada em ${new Date().toLocaleDateString('pt-BR')}`,W/2,pH-4,{align:'center'})

  doc.save(`Proposta_TSM_${p.numero||'Rascunho'}.pdf`)
}

function saveEmpresa(id){

// ─── Funções de contatos em memória (form de cliente) ───────────────────────

function _ctListHTML(){
  if(_clienteContatos.length===0)
    return `<p style="padding:.875rem;font-size:.82rem;color:#9ca3af;text-align:center">Nenhum contato adicionado. Clique em "+ Adicionar" acima.</p>`
  return _clienteContatos.map((ct,idx)=>`
    <div style="display:flex;align-items:center;gap:.625rem;padding:.55rem .875rem;${idx<_clienteContatos.length-1?'border-bottom:1px solid #f3f4f6':''}">
      <button onclick="_toggleCtPrincipal(${idx})"
        title="${ct.principal?'Remover como principal':'Definir como contato principal'}"
        style="background:none;border:none;cursor:pointer;padding:0;font-size:1.05rem;line-height:1;flex-shrink:0;color:${ct.principal?'#f59e0b':'#d1d5db'}">
        ${ct.principal?'★':'☆'}
      </button>
      <div style="flex:1;min-width:0">
        <p style="font-size:.875rem;font-weight:${ct.principal?'600':'400'};color:#111827;margin:0">
          ${H.esc(ct.nome)}
          ${ct.principal?'<span style="font-size:.7rem;color:#f59e0b;font-weight:600;margin-left:.3rem">Principal</span>':''}
        </p>
        <p style="font-size:.75rem;color:#6b7280;margin:.05rem 0 0">
          ${[ct.cargo,ct.email,ct.celular||ct.telefone].filter(Boolean).map(H.esc).join(' · ')||'—'}
        </p>
      </div>
      <button style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:1.2rem;padding:0 .25rem;line-height:1;flex-shrink:0"
        onclick="_removeFromCtList(${idx})" title="Remover contato">&times;</button>
    </div>
  `).join('')
}

function _renderCtList(){
  const el=document.getElementById('lista-ct')
  if(el) el.innerHTML=_ctListHTML()
}

function _toggleCtPrincipal(idx){
  if(!_clienteContatos[idx]) return
  const novoValor=!_clienteContatos[idx].principal
  _clienteContatos.forEach((c,i)=>c.principal = (i===idx ? novoValor : false))
  _renderCtList()
}

function _removeFromCtList(idx){
  _clienteContatos.splice(idx,1)
  _renderCtList()
}

function _abrirAddContato(){
  const panel=document.getElementById('ct-add-panel')
  if(!panel) return
  const showing=panel.style.display!=='none'
  panel.style.display=showing?'none':''
  if(!showing){
    // Atualiza o dropdown de contatos existentes
    const sel=document.getElementById('ct-sel-exist')
    if(sel){
      const alreadyIds=_clienteContatos.filter(c=>c._id).map(c=>c._id)
      const opts=DB.all('contatos')
        .filter(c=>!alreadyIds.includes(c.id)&&!c.clienteId)
        .sort((a,b)=>a.nome?.localeCompare(b.nome||'')||0)
        .map(c=>`<option value="${c.id}">${H.esc(c.nome)}${c.cargo?' — '+H.esc(c.cargo):''}</option>`)
        .join('')
      sel.innerHTML='<option value="">Selecione um contato cadastrado...</option>'+opts
    }
    // Oculta mini-form se estava aberto
    const mf=document.getElementById('ct-mini-form')
    if(mf) mf.style.display='none'
  }
}

function _vincularCtExistente(){
  const sel=document.getElementById('ct-sel-exist')
  const id=sel?.value
  if(!id){alert('Selecione um contato da lista.');return}
  const ct=DB.find('contatos',id)
  if(!ct) return
  _clienteContatos.push({...ct,_id:ct.id})
  _renderCtList()
  document.getElementById('ct-add-panel').style.display='none'
}

function _mostrarFormNovoContato(){
  const f=document.getElementById('ct-mini-form')
  if(!f) return
  f.style.display=''
  ;['ctn-nome','ctn-cargo','ctn-email','ctn-cel'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value=''
  })
  const p=document.getElementById('ctn-princ'); if(p) p.checked=false
  document.getElementById('ctn-nome')?.focus()
}

function _salvarNovoContato(){
  const g=i=>document.getElementById(i)?.value?.trim()
  const nome=g('ctn-nome')
  if(!nome){alert('Nome é obrigatório');return}
  const principal=document.getElementById('ctn-princ')?.checked||false
  if(principal) _clienteContatos.forEach(c=>c.principal=false)
  _clienteContatos.push({
    _id:null, nome, cargo:g('ctn-cargo'), email:g('ctn-email'),

function maskCNPJ(v){
  v=v.replace(/\D/g,'').slice(0,14)
  if(v.length>12) v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2}).*/,'$1.$2.$3/$4-$5')
  else if(v.length>8) v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4}).*/,'$1.$2.$3/$4')
  else if(v.length>5) v=v.replace(/^(\d{2})(\d{3})(\d{0,3}).*/,'$1.$2.$3')
  else if(v.length>2) v=v.replace(/^(\d{2})(\d{0,3}).*/,'$1.$2')
  return v
}

async function buscarCNPJ(){
  const raw=document.getElementById('c-doc')?.value||''
  const cnpj=raw.replace(/\D/g,'')
  const statusEl=document.getElementById('cnpj-status')
  const btnEl=document.getElementById('btn-buscar-cnpj')

  if(cnpj.length!==14){
    statusEl.textContent='⚠ Digite um CNPJ com 14 dígitos antes de buscar.'
    statusEl.style.color='#d97706'; return
  }

  btnEl.disabled=true
  btnEl.textContent='Consultando...'
  statusEl.textContent='Aguarde, consultando a Receita Federal...'
  statusEl.style.color='#6b7280'

  try{
    const res=await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`)
    if(!res.ok) throw new Error(res.status===404?'CNPJ não encontrado na base da Receita.':'Erro ao consultar: '+res.status)
    const d=await res.json()

    // Preencher campos automaticamente
    const set=(id,val)=>{ const el=document.getElementById(id); if(el&&val) el.value=val }
    set('c-nome', d.razao_social)
    set('c-endereco', [d.logradouro, d.numero].filter(Boolean).join(', '))
    set('c-complemento', d.complemento)
    set('c-cidade', d.municipio)
    if(d.uf){ const sel=document.getElementById('c-estado'); if(sel) sel.value=d.uf }
    // Telefone: formatar DDD + número
    if(d.ddd_telefone_1){
      const t=d.ddd_telefone_1.replace(/\D/g,'')
      if(t) set('c-tel', t.length>=10?`(${t.slice(0,2)}) ${t.slice(2,6)}-${t.slice(6)}`:t)
    }
    // CNPJ Baixado: situação diferente de ATIVA
    const sit=(d.descricao_situacao_cadastral||d.situacao_cadastral||'').toUpperCase()
    const isBaixado=!sit.includes('ATIVA')
    document.getElementById('c-cnpj-baixado').checked=isBaixado

    statusEl.textContent=`✓ ${d.descricao_situacao_cadastral||sit} — ${d.razao_social||''}`
    statusEl.style.color=isBaixado?'#dc2626':'#16a34a'
  }catch(e){
    statusEl.textContent='✗ '+e.message
    statusEl.style.color='#dc2626'
  }finally{
    btnEl.disabled=false
    btnEl.innerHTML='<svg style="width:1rem;height:1rem;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg> Buscar na Receita'
  }
}

function saveCliente(id){
  const g=i=>document.getElementById(i)?.value?.trim()
  const tipo=g('c-tipo')
  const cpfCnpj=tipo==='pessoa_juridica'?g('c-doc'):g('c-cpf')
  const data={
    codigoT:g('c-codigoT'),
    nome:g('c-nome'), tipo,
    cpfCnpj,
    endereco:g('c-endereco'),
    complemento:g('c-complemento'),
    cidade:g('c-cidade'),
    estado:g('c-estado'),
    contato:g('c-contato'),
    telefone:g('c-tel'),
    email:g('c-email'),
    unidadeId:g('c-uni'),
    vendedorId:g('c-vendedor')||'',
    cnpjBaixado:document.getElementById('c-cnpj-baixado')?.checked||false,
    ativo:true
  }
  if(!data.nome){alert('Nome é obrigatório');return}

  // Salva o cliente e obtém o ID
  let savedId=id
  if(id){
    DB.update('clientes',id,data)
  } else {
    const inserted=DB.insert('clientes',data)
    savedId=inserted.id
  }

  // Salva os contatos em memória
  if(savedId){
    // Desvincula contatos que foram removidos da lista (só para clientes existentes)
    if(id){
      const idsNaLista=_clienteContatos.filter(c=>c._id).map(c=>c._id)
      DB.all('contatos').filter(c=>c.clienteId===savedId).forEach(c=>{
        if(!idsNaLista.includes(c.id)) DB.update('contatos',c.id,{clienteId:null,principal:false})
      })
    }
    // Salva/atualiza os contatos da lista em memória
    _clienteContatos.forEach(ct=>{
      if(ct._id){
        // Contato já existe no DB — atualiza clienteId e principal
        DB.update('contatos',ct._id,{clienteId:savedId,principal:!!ct.principal})
      } else {
        // Contato novo — insere
        DB.insert('contatos',{
          nome:ct.nome, cargo:ct.cargo||'', email:ct.email||'',
          celular:ct.celular||'', telefone:ct.telefone||'',
          clienteId:savedId, principal:!!ct.principal
        })
      }
    })
  }

  closeModal(); navigate('clientes')
}

      <div>${isEdit?`<button class="btn btn-danger btn-sm" onclick="if(confirm('Excluir este usuário?')){DB.delete('usuarios','${u.id}');closeModal();navigate('usuarios')}">Excluir</button>`:''}</div>
      <div class="flex gap-2">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveUsuario('${u.id||''}',${isEdit})">Salvar</button>
      </div>
    </div>
  </div>`
}

function saveUsuario(id, isEdit){
  const g=i=>document.getElementById(i)?.value?.trim()
  const nome=g('u-nome'), email=g('u-email'), senha=g('u-senha'), senha2=g('u-senha2')
  if(!nome){alert('Nome é obrigatório');return}
  if(!email){alert('E-mail é obrigatório');return}
  // Validar senha
  if(!isEdit && !senha){alert('Senha é obrigatória para novo usuário');return}
  if(senha && senha!==senha2){alert('As senhas não coincidem');return}
  if(senha && senha.length<4){alert('Senha deve ter no mínimo 4 caracteres');return}
  // Verificar e-mail duplicado
  const existing=DB.all('usuarios').find(u=>u.email?.toLowerCase()===email.toLowerCase() && u.id!==id)
  if(existing){alert('Este e-mail já está cadastrado');return}

  const data={nome,email,perfil:g('u-perfil'),unidadeId:g('u-uni'),telefone:g('u-tel'),ativo:document.getElementById('u-ativo')?.checked||false}
  if(senha) data.senha=senha  // só atualiza senha se foi preenchida

  if(id) DB.update('usuarios',id,data); else DB.insert('usuarios',data)
  closeModal(); navigate('usuarios')
}

// UNIDADES
// ═══════════════════════════════════════════════════════
function renderUnidades(){
  const unis=DB.all('unidades'), usuarios=DB.all('usuarios')
  return H.header('Unidades','Unidades operacionais TSM','Nova Unidade','newUnidade()')+
  `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    ${unis.map(u=>{
      const gerente=u.gerenteId?usuarios.find(us=>us.id===u.gerenteId):null
      const locParts=[u.endereco,u.bairro,[u.estado].filter(Boolean).join('')].filter(Boolean)
      const loc=locParts.length?locParts.join(', '):''
      return `
      <div class="card p-5 cursor-pointer hover:shadow-md transition-shadow" onclick="editUnidade('${u.id}')">
        <div class="flex items-start gap-3">
          <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </div>
          <div style="flex:1;min-width:0">
            <p class="font-semibold">${H.esc(u.nome)}</p>
            <span class="badge bg-blue-100 text-blue-700 mt-1">${H.esc(u.sigla)}</span>
            ${u.descricao?`<p class="text-sm text-gray-500 mt-1">${H.esc(u.descricao)}</p>`:''}
            ${loc?`<p class="text-xs text-gray-400 mt-1 truncate">📍 ${H.esc(loc)}</p>`:''}
            ${gerente?`<p class="text-xs text-gray-500 mt-1">👤 ${H.esc(gerente.nome)}</p>`:''}
          </div>
        </div>
        <div class="mt-3 flex items-center justify-between text-xs text-gray-400">
          <span>${u.ativo?'✓ Ativa':'✗ Inativa'}</span><span class="text-blue-600">Editar →</span>
        </div>
      </div>`}).join('')}
    ${unis.length===0?`<div class="col-span-3 card">${H.empty('Nenhuma unidade','','Nova Unidade','newUnidade()')}</div>`:''}
  </div>`
}
function newUnidade(){openModal(formUnidade({}))}
function editUnidade(id){openModal(formUnidade(DB.find('unidades',id)||{}))}
function formUnidade(u={}){
  const isEdit=!!u.id
  const usuarios=DB.all('usuarios').filter(us=>us.ativo!==false)
  const optsGerente=usuarios.map(us=>`<option value="${us.id}"${us.id===u.gerenteId?' selected':''}>${H.esc(us.nome)} — ${H.esc(H.perfil(us.perfil))}</option>`).join('')
  return `<div class="p-5" style="min-width:580px">
    <div class="flex items-center justify-between mb-4"><h2 class="text-lg font-bold">${isEdit?'Editar':'Nova'} Unidade</h2><button onclick="closeModal()" class="text-gray-400 text-xl">&times;</button></div>
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="lbl">Nome *</label><input id="un-nome" class="inp" value="${H.esc(u.nome||'')}" placeholder="Serra do Mar"></div>
        <div><label class="lbl">Sigla *</label><input id="un-sigla" class="inp" value="${H.esc(u.sigla||'')}" placeholder="SDM" style="text-transform:uppercase" maxlength="10"></div>
      </div>
      <div><label class="lbl">Descrição</label><textarea id="un-desc" class="inp" rows="2">${H.esc(u.descricao||'')}</textarea></div>
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide pt-1">Endereço</p>
      <div class="grid grid-cols-3 gap-3">
        <div><label class="lbl">CEP</label><input id="un-cep" class="inp" value="${H.esc(u.cep||'')}" placeholder="00000-000" maxlength="9" oninput="this.value=this.value.replace(/\\D/g,'').replace(/(\\d{5})(\\d)/,'$1-$2').substring(0,9)" onblur="_buscarCepUnidade()"></div>
        <div class="col-span-2"><label class="lbl">Endereço</label><input id="un-end" class="inp" value="${H.esc(u.endereco||'')}" placeholder="Rua, número"></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="lbl">Bairro</label><input id="un-bairro" class="inp" value="${H.esc(u.bairro||'')}" placeholder="Bairro"></div>
        <div><label class="lbl">Estado</label>
          <select id="un-estado" class="inp">
            <option value="">Selecione...</option>
            ${['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'].map(e=>`<option value="${e}"${e===u.estado?' selected':''}>${e}</option>`).join('')}
          </select>
        </div>
      </div>
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide pt-1">Responsável</p>
      <div><label class="lbl">Gerente da Unidade</label>
        <select id="un-gerente" class="inp">
          <option value="">Sem gerente vinculado</option>
          ${optsGerente}
        </select>
      </div>
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide pt-1">Tributação</p>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="lbl">Imposto (%)</label>
          <div style="position:relative">
            <input id="un-imposto" class="inp" type="number" min="0" max="100" step="0.01"
              value="${u.imposto!=null?u.imposto:''}" placeholder="Ex: 12.50"
              style="padding-right:2rem">
            <span style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:.85rem;pointer-events:none">%</span>
          </div>
          <p style="font-size:.7rem;color:#6b7280;margin-top:.2rem">Aplicado automaticamente no total da proposta</p>
        </div>
      </div>
      <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="un-ativo" ${u.ativo!==false?'checked':''} class="rounded"><span class="text-sm text-gray-700">Unidade ativa</span></label>
    </div>
    <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
      <div>${isEdit?`<button class="btn btn-danger btn-sm" onclick="if(confirm('Excluir?')){DB.delete('unidades','${u.id}');closeModal();navigate('unidades')}">Excluir</button>`:''}</div>
      <div class="flex gap-2"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveUnidade('${u.id||''}')">Salvar</button></div>
    </div>
  </div>`
}
function _buscarCepUnidade(){
  const cep=document.getElementById('un-cep')?.value.replace(/\D/g,'')
  if(cep.length!==8)return
  fetch(`https://brasilapi.com.br/api/cep/v1/${cep}`).then(r=>r.json()).then(d=>{
    if(d.street||d.neighborhood){
      const e=document.getElementById('un-end'); if(e&&!e.value) e.value=d.street||''
      const b=document.getElementById('un-bairro'); if(b&&!b.value) b.value=d.neighborhood||''
      const es=document.getElementById('un-estado'); if(es&&!es.value) es.value=d.state||''
    }
  }).catch(()=>{})
}
function saveUnidade(id){
  const g=i=>document.getElementById(i)?.value?.trim()
  const data={
    nome:g('un-nome'), sigla:(g('un-sigla')||'').toUpperCase(), descricao:g('un-desc'),
    cep:g('un-cep'), endereco:g('un-end'), bairro:g('un-bairro'), estado:g('un-estado'),
    gerenteId:g('un-gerente')||'',
    imposto:parseFloat(g('un-imposto'))||0,
    ativo:document.getElementById('un-ativo')?.checked||false
  }
  if(!data.nome){alert('Nome é obrigatório');return}
  if(id) DB.update('unidades',id,data); else DB.insert('unidades',data)
  closeModal(); navigate('unidades')
}
